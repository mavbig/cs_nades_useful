<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Nade Filter Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 p-8">
    <div class="max-w-md mx-auto space-y-8">
        <header class="border-b border-zinc-800 pb-4">
            <h1 class="text-xl font-bold">Mockup: Nade Filters</h1>
            <p class="text-zinc-500 text-sm italic">Approaches for the utility filter</p>
        </header>

        <!-- Approach 1: Pill Buttons -->
        <section class="space-y-4">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-400">Approach 1: Colored Pill Buttons</h2>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-blue-500 text-white font-medium text-sm transition-all ring-2 ring-blue-500/20">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    All
                </button>
                <button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800/50 border border-zinc-700/50 text-zinc-300 font-medium text-sm hover:bg-zinc-800 transition-all">
                    <i data-lucide="cloud" class="w-4 h-4 text-slate-400"></i>
                    Smoke
                </button>
                <button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800/50 border border-zinc-700/50 text-zinc-300 font-medium text-sm hover:bg-zinc-800 transition-all">
                    <i data-lucide="zap" class="w-4 h-4 text-yellow-400"></i>
                    Flash
                </button>
                <button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800/50 border border-zinc-700/50 text-zinc-300 font-medium text-sm hover:bg-zinc-800 transition-all">
                    <i data-lucide="flame" class="w-4 h-4 text-orange-500"></i>
                    Molly
                </button>
                <button class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-zinc-800/50 border border-zinc-700/50 text-zinc-300 font-medium text-sm hover:bg-zinc-800 transition-all">
                    <i data-lucide="bomb" class="w-4 h-4 text-red-500"></i>
                    HE
                </button>
            </div>
        </section>

        <!-- Approach 2: Subtle Segment -->
        <section class="space-y-4">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-400">Approach 2: Subtle Outline Icons</h2>
            <div class="flex gap-2 p-1.5 bg-zinc-900/50 border border-zinc-800 rounded-xl overflow-x-auto no-scrollbar">
                <button class="flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-zinc-800 text-white font-medium text-xs transition-all shadow-sm">
                    All
                </button>
                <button class="flex items-center justify-center p-2 rounded-lg text-zinc-400 hover:text-zinc-200 transition-all">
                    <i data-lucide="cloud" class="w-5 h-5"></i>
                </button>
                <button class="flex items-center justify-center p-2 rounded-lg text-zinc-400 hover:text-zinc-200 transition-all">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                </button>
                <button class="flex items-center justify-center p-2 rounded-lg text-zinc-400 hover:text-zinc-200 transition-all">
                    <i data-lucide="flame" class="w-5 h-5"></i>
                </button>
                <button class="flex items-center justify-center p-2 rounded-lg text-zinc-400 hover:text-zinc-200 transition-all">
                    <i data-lucide="bomb" class="w-5 h-5"></i>
                </button>
            </div>
        </section>

        <!-- Approach 3: Floating Glow -->
        <section class="space-y-4">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-400">Approach 3: Vivid Glow Icons (Active)</h2>
            <div class="flex gap-4 items-center px-2 py-4 bg-zinc-900 rounded-2xl border border-zinc-800/50">
                <div class="flex flex-col items-center gap-1 cursor-pointer group">
                    <div class="w-10 h-10 rounded-xl bg-slate-500/20 border border-slate-500/30 flex items-center justify-center text-slate-400 group-hover:bg-slate-500 group-hover:text-white transition-all shadow-[0_0_15px_-5px_rgba(100,116,139,0.4)]">
                        <i data-lucide="cloud" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] uppercase font-bold text-zinc-500 group-hover:text-zinc-300">Smoke</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer group">
                    <div class="w-10 h-10 rounded-xl bg-yellow-500/20 border border-yellow-500/30 flex items-center justify-center text-yellow-500 group-hover:bg-yellow-500 group-hover:text-white transition-all shadow-[0_0_15px_-5px_rgba(234,179,8,0.4)]">
                        <i data-lucide="zap" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] uppercase font-bold text-yellow-500">Flash</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer group opacity-50 grayscale">
                    <div class="w-10 h-10 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center justify-center text-orange-500 transition-all">
                        <i data-lucide="flame" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] uppercase font-bold text-zinc-500">Molly</span>
                </div>
                <div class="flex flex-col items-center gap-1 cursor-pointer group opacity-50 grayscale">
                    <div class="w-10 h-10 rounded-xl bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-500 transition-all">
                        <i data-lucide="bomb" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[10px] uppercase font-bold text-zinc-500">HE</span>
                </div>
            </div>
        </section>

        <!-- Preview: Lineup Card Update -->
        <section class="space-y-4 pt-4 border-t border-zinc-800">
             <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-400">Card Preview (State of the Art)</h2>
             <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 flex items-center gap-4">
                 <div class="w-24 h-16 bg-zinc-800 rounded-lg overflow-hidden relative">
                     <div class="absolute top-1 left-1 px-1.5 py-0.5 bg-slate-900/80 backdrop-blur rounded text-[8px] font-bold text-slate-300 border border-slate-700/50 flex items-center gap-1">
                         <i data-lucide="cloud" class="w-2.5 h-2.5"></i> SMOKE
                     </div>
                 </div>
                 <div>
                     <h3 class="font-bold text-sm">Window Smoke from Base</h3>
                     <p class="text-xs text-zinc-500">Mirage · Stand · T Side</p>
                 </div>
             </div>
        </section>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
